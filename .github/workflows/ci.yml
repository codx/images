name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

jobs:
  ci:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lint shell scripts
        run: git ls-files -z '*.sh' | xargs -0r shellcheck --color=always

      - name: Validate YAML
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            yq ea -e '[.] | all_c(type == "!!map")' "$f" >/dev/null
            echo "ok: $f"
          done < <(git ls-files -z '*.yml' '*.yaml')
