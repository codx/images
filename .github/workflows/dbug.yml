name: Build and push dbug

on:
  push:
    branches: [main]
    paths:
      - oci/dbug/**
      - .github/workflows/dbug.yml
  pull_request:
    paths:
      - oci/dbug/**
      - .github/workflows/dbug.yml
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/codx/dbug
  DOCKERHUB_IMAGE: docker.io/codo/dbug

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Lint recipes (commands must exist in the image)
        run: oci/dbug/lint-recipes.sh

  # Build the packages and image. The apko run that pushes also writes the
  # SBOMs, so they match the pushed image.
  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive   # vendored tldr-pages the melange build copies cheatsheets from

      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        continue-on-error: true

      - name: Install apko
        env:
          APKO_VERSION: 1.2.11
        run: |
          curl -sSfL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 "apko_${APKO_VERSION}_linux_amd64/apko"

      - name: Install melange
        uses: chainguard-dev/actions/setup-melange@e1c4977ad9cb32b12c5b222ec0134a22bec60bd5 # v1.6.25

      - name: Generate melange signing key
        run: melange keygen oci/dbug/melange.rsa

      - name: Build melange packages
        run: |
          for arch in amd64 arm64; do
            melange build oci/dbug/melange.yaml \
              --arch "$arch" \
              --source-dir oci/dbug \
              --signing-key oci/dbug/melange.rsa \
              --out-dir oci/dbug/out/packages
          done

      # Log in before building so apko can push. Skipped on PRs (local build).
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # PRs build a local tar, pushes publish. Both write per-arch SBOMs
      # (sbom-x86_64, sbom-aarch64) plus an index SBOM for the multi-arch image.
      - name: Build image and SBOMs
        working-directory: oci/dbug
        run: |
          set -euo pipefail
          mkdir -p sbom   # apko moves SBOMs here but won't create the dir
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            apko build \
              --arch amd64,arm64 \
              --keyring-append melange.rsa.pub \
              --sbom-path sbom \
              apko.yaml \
              "$GHCR_IMAGE:latest" \
              dbug.tar
          else
            apko publish \
              --arch amd64,arm64 \
              --keyring-append melange.rsa.pub \
              --sbom-path sbom \
              apko.yaml \
              "$GHCR_IMAGE:latest" \
              "$DOCKERHUB_IMAGE:latest"
          fi

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: oci/dbug/sbom/*.spdx.json

  # Provenance for the published image: submit the dependency graph, sign
  # per-digest SBOM attestations, update the Docker Hub description.
  attest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # dependency-graph SBOM submission
      packages: write   # push attestations to GHCR
      id-token: write   # keyless cosign signing
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Same packages on every arch, so submit one to avoid double-counting
      # in Dependabot alerts.
      - name: Submit SBOM to dependency graph
        uses: advanced-security/spdx-dependency-submission-action@169d22427d74f3faf93504e70b03eede8dab272a # v0.2.0
        with:
          filePath: sbom
          filePattern: sbom-x86_64.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless (OIDC) attestations. Read each digest back from the registry so
      # it binds to the pushed bytes: the index digest gets the index SBOM, each
      # platform digest gets its single-arch SBOM.
      - name: Attest SBOMs
        run: |
          set -euo pipefail
          expected_archs=2
          for img in "$GHCR_IMAGE:latest" "$DOCKERHUB_IMAGE:latest"; do
            repo=${img%:*}

            # Index digest (what `:latest` resolves to) gets the index SBOM.
            index_digest=$(docker buildx imagetools inspect "$img" --format '{{.Manifest.Digest}}')
            cosign attest --yes \
              --predicate sbom/sbom-index.spdx.json \
              --type spdxjson \
              "${repo}@${index_digest}"

            # Collect the platform manifests and check the count, so a malformed
            # index fails here instead of attesting nothing. The here-string (not
            # a pipe) keeps the loop in this shell so a bad arch aborts the step.
            platforms=$(docker buildx imagetools inspect --raw "$img" \
              | jq -r '.manifests[] | select(.platform.os != "unknown") | "\(.platform.architecture) \(.digest)"')
            count=$(printf '%s\n' "$platforms" | grep -c . || true)
            if [ "$count" -ne "$expected_archs" ]; then
              echo "expected $expected_archs platform manifests for $img, found $count" >&2
              exit 1
            fi

            while read -r arch digest; do
              case "$arch" in
                amd64) sbom=sbom/sbom-x86_64.spdx.json ;;
                arm64) sbom=sbom/sbom-aarch64.spdx.json ;;
                *) echo "no SBOM for arch: $arch" >&2; exit 1 ;;
              esac
              cosign attest --yes \
                --predicate "$sbom" \
                --type spdxjson \
                "${repo}@${digest}"
            done <<< "$platforms"
          done

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: codo/dbug
          readme-filepath: oci/dbug/README.md

  # Report-only scan: Trivy, Grype and OSV-Scanner scan the SBOM and publish
  # SARIF to the Security tab. None fail the build.
  scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to code scanning
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom
          path: sbom

      - name: Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: sbom
          scan-ref: sbom/sbom-x86_64.spdx.json
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy.sarif
          category: trivy

      - name: Grype
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom/sbom-x86_64.spdx.json
          fail-build: false
          output-format: sarif
      - name: Upload Grype SARIF
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype

      - name: Stage SBOM for OSV-Scanner
        run: |
          mkdir -p osv-in
          cp sbom/sbom-x86_64.spdx.json osv-in/
      - name: OSV-Scanner
        continue-on-error: true   # report-only; never fail the build
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            scan
            source
            --format=sarif
            --output-file=osv.sarif
            --allow-no-lockfiles
            ./osv-in/
      - name: Upload OSV SARIF
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: osv.sarif
          category: osv-scanner
