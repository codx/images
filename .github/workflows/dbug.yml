name: Build and push dbug

# Pull requests run the melange build to validate the change but never publish:
# the push steps below are gated on `github.event_name != 'pull_request'`. This
# gives Dependabot PRs a green check so the auto-merge action can pick them up.
#
# Publishing on push is still manual-only for now. To re-enable, uncomment:
# on:
#   push:
#     branches: [main]
#     paths:
#       - oci/dbug/**
#       - .github/workflows/dbug.yml
on:
  pull_request:
    paths:
      - oci/dbug/**
      - .github/workflows/dbug.yml
  workflow_dispatch:

env:
  GHCR_IMAGE: ghcr.io/codx/dbug
  DOCKERHUB_IMAGE: docker.io/codo/dbug

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Needed for the vendored tldr-pages submodule (oci/dbug/vendor/tldr),
          # which the melange build copies the cheatsheet pages from.
          submodules: recursive

      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        continue-on-error: true

      - name: Install apko
        env:
          APKO_VERSION: 1.2.11
        run: |
          curl -sSfL "https://github.com/chainguard-dev/apko/releases/download/v${APKO_VERSION}/apko_${APKO_VERSION}_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 "apko_${APKO_VERSION}_linux_amd64/apko"

      - name: Install melange
        uses: chainguard-dev/actions/setup-melange@e1c4977ad9cb32b12c5b222ec0134a22bec60bd5 # v1.6.25

      - name: Generate melange signing key
        run: melange keygen oci/dbug/melange.rsa

      - name: Build melange packages
        run: |
          for arch in amd64 arm64; do
            melange build oci/dbug/melange.yaml \
              --arch "$arch" \
              --source-dir oci/dbug \
              --signing-key oci/dbug/melange.rsa \
              --out-dir oci/dbug/out/packages
          done

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build and push multi-arch
        if: github.event_name != 'pull_request'
        working-directory: oci/dbug
        run: |
          apko publish \
            --arch amd64,arm64 \
            --keyring-append melange.rsa.pub \
            apko.yaml \
            ${{ env.GHCR_IMAGE }}:latest \
            ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Update Docker Hub description
        if: github.event_name != 'pull_request'
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4.0.2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: codo/dbug
          readme-filepath: oci/dbug/README.md
